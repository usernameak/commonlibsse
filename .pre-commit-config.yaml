repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: [--style=file]

  - repo: local
    hooks:
      - id: cmake-generate
        name: Generate CMake file lists
        entry: python scripts/cmake_generate.py
        language: system
        pass_filenames: false
        files: \.(h|hpp|hxx|c|cpp|cxx)$
